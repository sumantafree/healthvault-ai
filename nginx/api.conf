# HealthVault AI — Nginx config for FastAPI backend
# File: /etc/nginx/sites-available/healthvault-api
# Subdomain: api.yourdomain.com

server {
    listen 80;
    server_name api.yourdomain.com;
    # Certbot will auto-add SSL block below after: certbot --nginx
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.yourdomain.com;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options        "DENY"            always;
    add_header X-Content-Type-Options "nosniff"         always;
    add_header X-XSS-Protection       "1; mode=block"   always;
    add_header Referrer-Policy        "strict-origin"   always;

    # Upload size (match backend MAX_UPLOAD_SIZE_MB)
    client_max_body_size 25M;

    # Gzip
    gzip on;
    gzip_types application/json text/plain;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout for long AI processing requests
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;
    }

    # Health check endpoint — no auth needed
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
    }

    # Block access to internal paths
    location ~ /\. {
        deny all;
    }
}
